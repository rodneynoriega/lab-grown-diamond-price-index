name: Monthly diamond price scrape

on:
  schedule:
    # 1st of every month, 14:00 UTC (~10am ET / 7am PT)
    - cron: "0 14 1 * *"
  workflow_dispatch:   # allows manual runs for testing

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python scrape_brilliant_earth.py

      - name: Commit updated CSV
        run: |
          git config user.name  "price-index-bot"
          git config user.email "price-index-bot@users.noreply.github.com"
          git add data/prices.csv
          if git diff --staged --quiet; then
            echo "No new data; nothing to commit."
          else
            git commit -m "data: monthly scrape $(date -u +%Y-%m-%d)"
            git push
          fi
